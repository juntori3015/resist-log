<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SAVE QUEST - 我慢を記録してコインを貯めよう</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3460058387565786" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --bg: #0d0d14;
  --bg2: #13131e;
  --bg3: #1a1a28;
  --border: #2a2a40;
  --gold: #f0c040;
  --gold2: #ffd700;
  --text: #e8e8f0;
  --text2: #8888aa;
  --accent: #7c5cfc;
  --success: #40d080;
  --nav-h: 64px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* SCREENS */
.screen {
  display: none;
  padding: 0 0 calc(var(--nav-h) + 16px);
  min-height: 100vh;
}
.screen.active { display: block; }

/* HEADER */
.header {
  padding: 24px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0;
  line-height: 1.3;
}
.sort-toggle-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.sort-toggle-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.cat-btn.sort-active {
  border-style: dashed;
  border-color: var(--accent);
  cursor: grab;
}
.cat-btn.drag-over {
  border-color: var(--gold);
  background: var(--bg3);
  transform: scale(1.03);
}
.drag-handle {
  font-size: 16px;
  color: var(--text2);
  letter-spacing: 2px;
}

/* COIN DISPLAY */
.coin-section {
  padding: 4px 16px 16px;
  text-align: center;
}
.coin-icon-big {
  font-size: 40px;
  display: block;
  margin-bottom: 6px;
}
.coin-amount {
  font-family: 'Press Start 2P', monospace;
  font-size: 30px;
  color: var(--gold);
  letter-spacing: 2px;
}
.coin-label {
  font-size: 10px;
  color: var(--text2);
  margin-top: 6px;
  letter-spacing: 3px;
}

/* PROGRESS */
.progress-section {
  padding: 0 16px 16px;
}
.progress-header {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 8px;
}
.progress-bar {
  height: 8px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chest-label {
  margin-top: 8px;
  text-align: center;
  font-size: 13px;
  color: var(--text2);
}

/* STREAK + TODAY */
.home-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 18px;
}
.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 14px;
}
.today-label {
  font-size: 13px;
  color: var(--text2);
}

/* SECTION TITLE */
.section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  padding: 0 16px 12px;
}

/* CATEGORY GRID */
.category-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 0 16px;
}
.cat-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 10px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
  user-select: none;
  min-height: 110px;
  justify-content: center;
}
.cat-btn:active {
  transform: scale(0.95);
  background: var(--bg3);
  border-color: var(--gold);
}
.cat-btn.cat-done {
  opacity: 0.35;
  cursor: default;
}
.cat-btn.cat-done::after {
  content: '✓';
  position: absolute;
  top: 6px;
  right: 10px;
  font-size: 14px;
  color: var(--success);
}
.cat-icon { width: 40px; height: 40px; }
.cat-name {
  font-size: 13px;
  font-weight: 700;
  text-align: center;
  color: var(--text);
  line-height: 1.4;
}
.cat-coins {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--gold);
}

/* COIN FLY ANIMATION */
.coin-fly {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 22px;
  animation: coinFly 1s ease-out forwards;
}
@keyframes coinFly {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-130px) scale(0.4); opacity: 0; }
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 1000;
}
.modal-overlay.show { display: block; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 24px;
  width: 300px;
  text-align: center;
  animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: absolute;
  touch-action: none;
  cursor: grab;
  transition: box-shadow 0.15s;
}
.modal:active { cursor: grabbing; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
@keyframes modalPop {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.modal-icon { display: flex; justify-content: center; margin-bottom: 12px; }
.modal-icon .cat-icon { width: 64px; height: 64px; }
.modal-plus {
  font-family: 'Press Start 2P', monospace;
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 8px;
}
.modal-name {
  font-size: 13px;
  color: var(--text);
  margin-bottom: 18px;
}
.modal-total {
  font-size: 12px;
  color: var(--text2);
  padding: 10px;
  background: var(--bg3);
  border-radius: 8px;
  margin-bottom: 20px;
}
.modal-total span {
  font-family: 'Press Start 2P', monospace;
  color: var(--gold);
  font-size: 12px;
}
.modal-btn {
  background: var(--accent);
  border: none;
  color: white;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 12px 32px;
  border-radius: 50px;
  cursor: pointer;
  width: 100%;
  transition: opacity 0.2s;
}
.modal-btn:active { opacity: 0.8; }

/* CHEST MODAL */
.chest-sparkles {
  font-size: 26px;
  letter-spacing: 10px;
  margin-bottom: 8px;
}
.chest-modal-emoji {
  display: flex;
  justify-content: center;
  margin-bottom: 8px;
  animation: chestBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes chestBounce {
  0%   { transform: scale(0) rotate(-15deg); }
  60%  { transform: scale(1.2) rotate(5deg); }
  100% { transform: scale(1) rotate(0); }
}
.chest-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 8px;
  line-height: 1.8;
}
.chest-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 20px;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  height: var(--nav-h);
  display: flex;
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  color: var(--text2);
  font-size: 10px;
  transition: color 0.15s;
}
.nav-item.active { color: var(--gold); }
.nav-icon svg { width: 24px; height: 24px; }
.nav-item .nav-icon svg { stroke: currentColor; }


/* STATS */
.stats-tabs {
  display: flex;
  margin: 16px;
  background: var(--bg3);
  border-radius: 10px;
  padding: 3px;
}
.stats-tab {
  flex: 1;
  padding: 9px;
  text-align: center;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text2);
}
.stats-tab.active {
  background: var(--accent);
  color: white;
}
.stats-content { display: none; padding: 0 16px 16px; }
.stats-content.active { display: block; }

.stats-total-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  text-align: center;
  margin-bottom: 16px;
}
.stats-total-label { font-size: 14px; color: var(--text2); margin-bottom: 6px; }
.stats-total-value {
  font-family: 'Press Start 2P', monospace;
  font-size: 22px;
  color: var(--gold);
}

/* BAR CHART */
.chart-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
}
.chart-card-title { font-size: 13px; color: var(--text2); letter-spacing: 1px; margin-bottom: 14px; }
.bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.bar-day {
  font-size: 13px;
  color: var(--text2);
  width: 24px;
  flex-shrink: 0;
  text-align: center;
}
.bar-day.today { color: var(--gold); font-weight: 700; }
.bar-track {
  flex: 1;
  height: 12px;
  background: var(--bg);
  border-radius: 6px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 6px;
  transition: width 0.6s ease;
}
.bar-val { font-size: 13px; color: var(--text2); width: 56px; text-align: right; flex-shrink: 0; }

/* CALENDAR */
.calendar {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
}
.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.cal-title { font-size: 15px; font-weight: 700; }
.cal-nav {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}
.cal-days-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 4px;
}
.cal-day-label {
  text-align: center;
  font-size: 12px;
  color: var(--text2);
  padding: 2px 0;
}
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-size: 13px;
  color: var(--text2);
}
.cal-day.has-record {
  background: var(--accent);
  color: white;
  font-weight: 700;
}
.cal-day.is-today {
  border: 1.5px solid var(--gold);
  color: var(--gold);
}
.cal-day.has-record.is-today {
  border-color: var(--gold2);
}
.cal-day.empty { visibility: hidden; }

/* BREAKDOWN */
.breakdown-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
}
.breakdown-card-title { font-size: 13px; color: var(--text2); letter-spacing: 1px; margin-bottom: 14px; }
.breakdown-item { margin-bottom: 12px; }
.breakdown-header {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 5px;
}
.breakdown-pct { color: var(--gold); font-size: 13px; }
.breakdown-bar-track {
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
}
.breakdown-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 3px;
}
.empty-msg {
  text-align: center;
  color: var(--text2);
  font-size: 15px;
  padding: 20px 0;
}

/* SETTINGS */
.settings-section {
  margin: 0 16px 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.settings-section-title {
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 2px;
  padding: 14px 16px 10px;
}
.settings-row {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
.settings-row-value { color: var(--text2); font-size: 12px; }

.custom-form {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.custom-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 10px 12px;
  margin-bottom: 8px;
  outline: none;
}
.custom-input:focus { border-color: var(--accent); }
.save-btn {
  background: var(--accent);
  border: none;
  color: white;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
}

.chest-row {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.chest-row-icon { font-size: 22px; }
.chest-row-info { flex: 1; }
.chest-row-name { font-size: 12px; font-weight: 700; }
.chest-row-coins { color: var(--text2); font-size: 11px; margin-top: 2px; }
.chest-status-done { color: var(--success); font-size: 11px; }
.chest-status-pending { color: var(--text2); font-size: 10px; text-align: right; }

.danger-btn {
  display: block;
  background: none;
  border: 1px solid #ff4455;
  color: #ff4455;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  width: calc(100% - 32px);
  margin: 0 16px 16px;
}
.privacy-link {
  display: block;
  text-align: center;
  color: var(--text2);
  font-size: 11px;
  padding: 8px;
  text-decoration: none;
}
.brand-footer {
  text-align: center;
  font-size: 10px;
  color: var(--border);
  padding: 8px 0 16px;
  letter-spacing: 3px;
}

.ad-area { padding: 16px; }
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="header-title">今日何我慢した？</div>
    <button class="sort-toggle-btn" id="sort-toggle" onclick="toggleSort()">並び替え</button>
  </div>

  <div class="coin-section">
    <span class="coin-icon-big">🏆</span>
    <div class="coin-amount" id="coin-display">0</div>
    <div class="coin-label">COINS</div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span id="progress-label-left">0 coins</span>
      <span id="progress-label-right">次まで —</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="chest-label" id="chest-label">次: BRONZE 5,000</div>
  </div>

  <div class="home-meta">
    <div class="streak-badge">
      <span>🔥</span>
      <span id="streak-display">連続 0日</span>
    </div>
    <div class="today-label" id="today-label">今日 0回</div>
  </div>

  <div class="category-grid" id="category-grid"></div>

  <div class="ad-area">
    <ins class="adsbygoogle" style="display:block"
         data-ad-client="ca-pub-3460058387565786"
         data-ad-slot="auto" data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>
</div>

<!-- STATS -->
<div id="screen-stats" class="screen">
  <div class="header">
    <div>
      <div class="header-title">STATS</div>
      <div class="header-sub">記録の振り返り</div>
    </div>
    <span style="font-size:24px">📊</span>
  </div>

  <div class="stats-tabs">
    <div class="stats-tab active" id="tab-week" onclick="switchStatsTab('week')">週次</div>
    <div class="stats-tab" id="tab-month" onclick="switchStatsTab('month')">月次</div>
  </div>

  <div class="stats-content active" id="stats-week">
    <div class="stats-total-card">
      <div class="stats-total-label">今週の合計</div>
      <div class="stats-total-value" id="week-total">0</div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">▸ 日別コイン</div>
      <div id="week-bars"></div>
    </div>
    <div class="breakdown-card">
      <div class="breakdown-card-title">▸ カテゴリー内訳</div>
      <div id="week-breakdown"></div>
    </div>
  </div>

  <div class="stats-content" id="stats-month">
    <div class="stats-total-card">
      <div class="stats-total-label">今月の合計</div>
      <div class="stats-total-value" id="month-total">0</div>
    </div>
    <div class="calendar">
      <div class="cal-header">
        <button class="cal-nav" onclick="prevMonth()">◀</button>
        <div class="cal-title" id="cal-title"></div>
        <button class="cal-nav" onclick="nextMonth()">▶</button>
      </div>
      <div class="cal-days-header">
        <div class="cal-day-label">日</div><div class="cal-day-label">月</div>
        <div class="cal-day-label">火</div><div class="cal-day-label">水</div>
        <div class="cal-day-label">木</div><div class="cal-day-label">金</div>
        <div class="cal-day-label">土</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div class="breakdown-card">
      <div class="breakdown-card-title">▸ カテゴリー内訳</div>
      <div id="month-breakdown"></div>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div id="screen-settings" class="screen">
  <div class="header">
    <div>
      <div class="header-title">SETTINGS</div>
      <div class="header-sub">設定</div>
    </div>
    <span style="font-size:24px">⚙️</span>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">カスタムカテゴリー</div>
    <div class="custom-form">
      <input type="text" class="custom-input" id="custom-name" placeholder="カテゴリー名（例: 映画我慢）" maxlength="12">
      <input type="number" class="custom-input" id="custom-coins" placeholder="コイン数（例: 800）" min="1" max="99999">
      <button class="save-btn" onclick="saveCustom()">保存する</button>
    </div>
    <div class="settings-row" id="custom-current-row" style="display:none">
      <span id="custom-current-name" style="font-size:13px">-</span>
      <span class="settings-row-value" id="custom-current-coins">-</span>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">宝箱マイルストーン</div>
    <div id="chest-list"></div>
  </div>

  <div class="ad-area">
    <ins class="adsbygoogle" style="display:block"
         data-ad-client="ca-pub-3460058387565786"
         data-ad-slot="auto" data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>

  <button class="danger-btn" onclick="confirmReset()">データをリセット</button>
  <a href="https://juntori3015.github.io/privacy-policy/" class="privacy-link" target="_blank">プライバシーポリシー</a>
  <div class="brand-footer">clav</div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" id="nav-home" onclick="showScreen('home')">

function loadData() {
  const def = { totalCoins:0, records:[], streak:{ count:0, lastDate:'' }, openedMedals:[], custom:null };
  try { return Object.assign(def, JSON.parse(localStorage.getItem('savequest_v1') || '{}')); }
  catch(e) { return def; }
}
function saveData(d) {
  localStorage.setItem('savequest_v1', JSON.stringify(d));
}
function getToday() {
  return new Date().toISOString().slice(0,10);
}

function updateStreak(data) {
  const today = getToday();
  if (data.streak.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  data.streak.count = (data.streak.lastDate === yesterday) ? data.streak.count + 1 : 1;
  data.streak.lastDate = today;
}

// ── SORT ──
let sortMode = false;
let sortOrder = null;
let dragState = null;

function getOrderedCategories(data) {
  const base = [...CATEGORIES];
  if (data.custom) base.push({ id:'custom', name:data.custom.name, emoji:'✏️', coins:data.custom.coins });
  else base.push({ id:'custom-set', name:'カスタム設定', emoji:'✏️', coins:null });
  const order = sortOrder || data.categoryOrder || base.map(c => c.id);
  sortOrder = order;
  return order.map(id => base.find(c => c.id === id)).filter(Boolean);
}

function toggleSort() {
  sortMode = !sortMode;
  if (!sortMode) {
    const data = loadData();
    data.categoryOrder = [...sortOrder];
    saveData(data);
  }
  const btn = document.getElementById('sort-toggle');
  btn.textContent = sortMode ? '完了' : '並び替え';
  btn.classList.toggle('active', sortMode);
  renderCategories(loadData());
}

function initSortDrag() {
  const grid = document.getElementById('category-grid');

  grid.addEventListener('touchstart', e => {
    if (!sortMode) return;
    const card = e.target.closest('.cat-btn');
    if (!card) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = card.getBoundingClientRect();
    const clone = card.cloneNode(true);
    clone.id = 'drag-clone';
    clone.style.cssText = `position:fixed;width:${rect.width}px;height:${rect.height}px;left:${rect.left}px;top:${rect.top}px;opacity:0.85;z-index:999;pointer-events:none;border:2px solid #f0c040;border-radius:16px;background:#1a1a28;box-shadow:0 8px 24px rgba(0,0,0,0.5);transition:none;`;
    document.body.appendChild(clone);
    card.style.opacity = '0.2';
    dragState = {
      card, clone,
      idx: parseInt(card.dataset.sortIdx),
      offsetX: touch.clientX - rect.left,
      offsetY: touch.clientY - rect.top
    };
  }, { passive: false });

  grid.addEventListener('touchmove', e => {
    if (!dragState) return;
    e.preventDefault();
    const touch = e.touches[0];
    dragState.clone.style.left = (touch.clientX - dragState.offsetX) + 'px';
    dragState.clone.style.top  = (touch.clientY - dragState.offsetY) + 'px';
    grid.querySelectorAll('.cat-btn').forEach(c => c.classList.remove('drag-over'));
    const target = getCardAt(touch.clientX, touch.clientY);
    if (target && target !== dragState.card) target.classList.add('drag-over');
  }, { passive: false });

  grid.addEventListener('touchend', e => {
    if (!dragState) return;
    const touch = e.changedTouches[0];
    const target = getCardAt(touch.clientX, touch.clientY);
    dragState.clone.remove();
    dragState.card.style.opacity = '';
    grid.querySelectorAll('.cat-btn').forEach(c => c.classList.remove('drag-over'));
    if (target && target !== dragState.card) {
      const from = dragState.idx;
      const to = parseInt(target.dataset.sortIdx);
      const moved = sortOrder.splice(from, 1)[0];
      sortOrder.splice(to, 0, moved);
      renderCategories(loadData());
    }
    dragState = null;
  });
}

function getCardAt(x, y) {
  for (const card of document.querySelectorAll('#category-grid .cat-btn')) {
    const r = card.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return card;
  }
  return null;
}

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'stats')    renderStats();
  if (name === 'settings') renderSettings();
}

// ── HOME ──
function renderHome() {
  const data = loadData();
  animateNumber('coin-display', data.totalCoins);

  const nextChest = MEDALS.find(c => c.coins > data.totalCoins) || MEDALS[MEDALS.length-1];
  const prevCoins = (MEDALS.slice().reverse().find(c => c.coins <= data.totalCoins) || { coins:0 }).coins;
  const allDone   = data.totalCoins >= MEDALS[MEDALS.length-1].coins;
  const pct       = allDone ? 100 : Math.min(100, ((data.totalCoins - prevCoins) / (nextChest.coins - prevCoins)) * 100);

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label-left').textContent  = data.totalCoins.toLocaleString() + ' coins';
  document.getElementById('progress-label-right').textContent = allDone ? '全達成！' : '次まで ' + (nextChest.coins - data.totalCoins).toLocaleString();
  document.getElementById('chest-label').textContent = allDone
    ? '✨ 全メダル獲得！'
    : '次: ' + nextChest.name + ' ' + nextChest.coins.toLocaleString();

  document.getElementById('streak-display').textContent = '連続 ' + data.streak.count + '日';
  const todayRecs = data.records.filter(r => r.date === getToday());
  const todayCoins = todayRecs.reduce((s,r)=>s+r.coins,0);
  document.getElementById('today-label').textContent = '今日 ' + todayRecs.length + '回 / +' + todayCoins.toLocaleString();

  renderCategories(data);
}

function renderCategories(data) {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';
  const all = getOrderedCategories(data);
  all.forEach((cat, idx) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (sortMode ? ' sort-active' : '');
    btn.dataset.sortIdx = idx;
    if (sortMode) {
      btn.innerHTML = `
        <span class="cat-name">${cat.name}</span>
        ${getCatIcon(cat.id)}
        <span class="drag-handle">☰</span>`;
    } else {
      btn.innerHTML = `
        <span class="cat-name">${cat.name}</span>
        ${getCatIcon(cat.id)}
        <span class="cat-coins" style="${cat.coins ? '' : 'color:var(--text2)'}">
          ${cat.coins ? '+' + cat.coins.toLocaleString() : '設定する'}
        </span>`;
      if (cat.coins) {
        const usedToday = data.records.some(r => r.date === getToday() && r.category === cat.name);
        if (usedToday) {
          btn.classList.add('cat-done');
          btn.disabled = true;
        } else {
          btn.onclick = e => recordCategory(cat, e);
        }
      } else {
        btn.onclick = () => showScreen('settings');
      }
    }
    grid.appendChild(btn);
  });
  if (sortMode) initSortDrag();
}

function recordCategory(cat, e) {
  const data = loadData();
  updateStreak(data);
  data.totalCoins += cat.coins;
  data.records.push({ date:getToday(), category:cat.name, emoji:cat.emoji, coins:cat.coins, ts:Date.now() });
  const newChests = MEDALS.filter(c => c.coins <= data.totalCoins && !data.openedMedals.includes(c.coins));
  newChests.forEach(c => data.openedMedals.push(c.coins));
  saveData(data);
  renderHome();
  spawnCoins(e);
  setTimeout(() => {
    showCoinModal(cat, data.totalCoins);
    if (newChests.length > 0) {
      setTimeout(() => {
        closeModal('coin-modal');
        showChestModal(newChests[newChests.length-1]);
      }, 1600);
    }
  }, 300);
}

function spawnCoins(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'coin-fly';
    el.textContent = '🪙';
    el.style.left  = (cx + (Math.random()-0.5)*50) + 'px';
    el.style.top   = cy + 'px';
    el.style.animationDelay = (i * 70) + 'ms';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300 + i*70);
  }
}

// ── MODAL DRAG & SNAP ──
const MODAL_SNAP_KEY = 'savequest_modal_pos';
let modalDragState = null;

function getSnapPositions(modalW, modalH) {
  const sw = window.innerWidth, sh = window.innerHeight;
  const pad = 16;
  const cols = [pad, sw/2 - modalW/2, sw - modalW - pad];
  const rows = [pad + 50, sh/2 - modalH/2, sh - modalH - 80];
  const positions = [];
  rows.forEach(y => cols.forEach(x => positions.push({ x, y })));
  return positions;
}

function snapToNearest(modal, x, y) {
  const w = modal.offsetWidth, h = modal.offsetHeight;
  const snaps = getSnapPositions(w, h);
  let best = snaps[0], bestDist = Infinity;
  snaps.forEach(s => {
    const d = Math.hypot(s.x - x, s.y - y);
    if (d < bestDist) { bestDist = d; best = s; }
  });
  modal.style.left = best.x + 'px';
  modal.style.top  = best.y + 'px';
  localStorage.setItem(MODAL_SNAP_KEY, JSON.stringify({ x: best.x, y: best.y }));
}

function positionModal(modal) {
  const w = modal.offsetWidth, h = modal.offsetHeight;
  const saved = JSON.parse(localStorage.getItem(MODAL_SNAP_KEY) || 'null');
  if (saved) {
    modal.style.left = saved.x + 'px';
    modal.style.top  = saved.y + 'px';
  } else {
    modal.style.left = (window.innerWidth/2  - w/2) + 'px';
    modal.style.top  = (window.innerHeight/2 - h/2) + 'px';
  }
}

function initModalDrag(modal) {
  modal.addEventListener('touchstart', e => {
    if (e.target.tagName === 'BUTTON') return;
    const t = e.touches[0];
    const rect = modal.getBoundingClientRect();
    modalDragState = { startX: t.clientX - rect.left, startY: t.clientY - rect.top };
    modal.style.transition = 'none';
    e.preventDefault();
  }, { passive: false });

  modal.addEventListener('touchmove', e => {
    if (!modalDragState) return;
    const t = e.touches[0];
    const x = t.clientX - modalDragState.startX;
    const y = t.clientY - modalDragState.startY;
    modal.style.left = x + 'px';
    modal.style.top  = y + 'px';
    e.preventDefault();
  }, { passive: false });

  modal.addEventListener('touchend', e => {
    if (!modalDragState) return;
    modal.style.transition = '';
    const rect = modal.getBoundingClientRect();
    snapToNearest(modal, rect.left, rect.top);
    modalDragState = null;
  });
}

document.querySelectorAll('.modal').forEach(m => initModalDrag(m));

function showCoinModal(cat, total) {
  document.getElementById('modal-icon').innerHTML    = getCatIcon(cat.id);
  document.getElementById('modal-plus').textContent  = '+' + cat.coins.toLocaleString() + ' COINS';
  document.getElementById('modal-name').textContent  = cat.name;
  document.getElementById('modal-total').textContent = total.toLocaleString();
  const overlay = document.getElementById('coin-modal');
  overlay.classList.add('show');
  requestAnimationFrame(() => positionModal(overlay.querySelector('.modal')));
}
function showChestModal(medal) {
  document.getElementById('chest-emoji').innerHTML = getMedalSVG(medal);
  document.getElementById('chest-title').textContent = medal.name + '!';
  document.getElementById('chest-title').style.color = medal.color;
  document.getElementById('chest-sub').textContent   = medal.coins.toLocaleString() + 'コイン達成！';
  const overlay = document.getElementById('chest-modal');
  overlay.classList.add('show');
  requestAnimationFrame(() => positionModal(overlay.querySelector('.modal')));
}
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function animateNumber(id, target) {
  const el = document.getElementById(id);
  const from = parseInt(el.textContent.replace(/,/g,'')) || 0;
  if (from === target) { el.textContent = target.toLocaleString(); return; }
  let i = 0;
  const steps = 20;
  const timer = setInterval(() => {
    i++;
    el.textContent = Math.round(from + (target - from) * (i/steps)).toLocaleString();
    if (i >= steps) clearInterval(timer);
  }, 20);
}

// ── STATS ──
let calYear, calMonth;
(function() { const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); })();

function switchStatsTab(tab) {
  document.querySelectorAll('.stats-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.stats-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('stats-' + tab).classList.add('active');
}

function renderStats() {
  renderWeekStats();
  renderMonthStats();
}

function renderWeekStats() {
  const data = loadData();
  const now = new Date();
  const dow = now.getDay();
  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(now); d.setDate(now.getDate() - dow + i);
    return d.toISOString().slice(0,10);
  });
  const labels = ['日','月','火','水','木','金','土'];
  const dayCoins = days.map(d => data.records.filter(r=>r.date===d).reduce((s,r)=>s+r.coins,0));
  const maxCoins = Math.max(...dayCoins, 1);
  const weekTotal = dayCoins.reduce((s,v)=>s+v,0);
  document.getElementById('week-total').textContent = weekTotal.toLocaleString();

  document.getElementById('week-bars').innerHTML = dayCoins.map((c,i) => `
    <div class="bar-row">
      <div class="bar-day ${days[i]===getToday()?'today':''}">${labels[i]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(c/maxCoins*100).toFixed(1)}%"></div></div>
      <div class="bar-val">${c>0?c.toLocaleString():'-'}</div>
    </div>`).join('');

  renderBreakdown('week-breakdown', data.records.filter(r=>days.includes(r.date)));
}

function renderMonthStats() {
  renderCalendar();
}

function renderCalendar() {
  const data = loadData();
  document.getElementById('cal-title').textContent = calYear + '年' + (calMonth+1) + '月';
  const monthStr = calYear + '-' + String(calMonth+1).padStart(2,'0');
  const monthRecs = data.records.filter(r=>r.date.startsWith(monthStr));
  const recDates  = new Set(monthRecs.map(r=>r.date));
  const today = getToday();
  const firstDow  = new Date(calYear, calMonth, 1).getDay();
  const daysInMon = new Date(calYear, calMonth+1, 0).getDate();

  let html = '';
  for (let i=0; i<firstDow; i++) html += '<div class="cal-day empty"></div>';
  for (let d=1; d<=daysInMon; d++) {
    const ds = monthStr + '-' + String(d).padStart(2,'0');
    html += `<div class="cal-day ${recDates.has(ds)?'has-record':''} ${ds===today?'is-today':''}">${d}</div>`;
  }
  document.getElementById('cal-days').innerHTML = html;
  document.getElementById('month-total').textContent = monthRecs.reduce((s,r)=>s+r.coins,0).toLocaleString();
  renderBreakdown('month-breakdown', monthRecs);
}

function prevMonth() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function nextMonth() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function renderBreakdown(elId, records) {
  const el = document.getElementById(elId);
  if (records.length === 0) { el.innerHTML = '<div class="empty-msg">まだ記録がありません</div>'; return; }
  const map = {};
  records.forEach(r => {
    if (!map[r.category]) map[r.category] = { coins:0, emoji:r.emoji||'' };
    map[r.category].coins += r.coins;
  });
  const sorted = Object.entries(map).sort((a,b)=>b[1].coins-a[1].coins);
  const total  = sorted.reduce((s,[,v])=>s+v.coins,0) || 1;
  el.innerHTML = sorted.slice(0,7).map(([name,v]) => {
    const pct = (v.coins/total*100).toFixed(0);
    return `
      <div class="breakdown-item">
        <div class="breakdown-header">
          <span>${v.emoji} ${name}</span>
          <span class="breakdown-pct">${v.coins.toLocaleString()} (${pct}%)</span>
        </div>
        <div class="breakdown-bar-track">
          <div class="breakdown-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');
}

// ── SETTINGS ──
function renderSettings() {
  const data = loadData();
  if (data.custom) {
    document.getElementById('custom-current-row').style.display = 'flex';
    document.getElementById('custom-current-name').textContent  = '✏️ ' + data.custom.name;
    document.getElementById('custom-current-coins').textContent = '+' + data.custom.coins.toLocaleString() + ' coins';
    document.getElementById('custom-name').value  = data.custom.name;
    document.getElementById('custom-coins').value = data.custom.coins;
  }
  document.getElementById('chest-list').innerHTML = MEDALS.map(c => {
    const done = data.openedMedals.includes(c.coins);
    const smallSVG = getMedalSVG(c).replace('width="64" height="72"', 'width="36" height="40"');
    return `
      <div class="chest-row">
        <span class="chest-row-icon">${smallSVG}</span>
        <div class="chest-row-info">
          <div class="chest-row-name" style="color:${c.color}">${c.name}</div>
          <div class="chest-row-coins">${c.coins.toLocaleString()} coins</div>
        </div>
        ${done
          ? '<span class="chest-status-done">✅ 達成</span>'
          : `<span class="chest-status-pending">${data.totalCoins.toLocaleString()} / ${c.coins.toLocaleString()}</span>`}
      </div>`;
  }).join('');
}

function saveCustom() {
  const name  = document.getElementById('custom-name').value.trim();
  const coins = parseInt(document.getElementById('custom-coins').value);
  if (!name || !coins || coins < 1) { alert('名前とコイン数を入力してください'); return; }
  const data = loadData();
  data.custom = { name, coins };
  saveData(data);
  renderSettings();
  renderHome();
  alert('カスタムカテゴリーを保存しました！');
}

function confirmReset() {
  if (confirm('全データをリセットしますか？この操作は取り消せません。')) {
    localStorage.removeItem('savequest_v1');
    renderHome();
    renderSettings();
  }
}
